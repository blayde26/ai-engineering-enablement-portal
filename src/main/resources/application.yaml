spring:
  application:
    name: ai-engineering-enablement-portal
ai:
  local:
    base-url: http://localhost:11434
    model: llama3.1
    timeout-seconds: 60
storage:
  local:
    task-file-path: data/tasks.json
management:
  endpoint:
    health:
      enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health
